apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos

metadata:
  name: network-delay
  namespace: default

spec:
  action: delay
  mode: one

  selector:
    namespaces:
      - default

    labelSelectors:
      app: cartservice

  delay:
    latency: "200ms"
    correlation: "50"
    jitter: "50ms"

  duration: "20s"